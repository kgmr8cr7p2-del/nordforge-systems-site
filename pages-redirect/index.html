<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NORDFORGE Portfolio</title>
    <meta http-equiv="refresh" content="0; url=https://nordforge-portfolio.vercel.app/" />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://nordforge-portfolio.vercel.app/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #071019;
        --panel: rgba(12, 20, 32, 0.95);
        --line: rgba(137, 185, 255, 0.18);
        --text: #eef5ff;
        --muted: #8ea4c5;
        --primary: #79d7ff;
        --primary-strong: #53b4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(83, 180, 255, 0.18), transparent 28%),
          linear-gradient(180deg, #04080f 0%, #071019 42%, #0b1523 100%);
        color: var(--text);
        font-family: "Segoe UI", "Manrope", sans-serif;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        margin-bottom: 14px;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.02;
      }

      .text {
        margin-top: 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 26px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 15px;
        text-decoration: none;
      }

      .primary {
        background: linear-gradient(135deg, var(--primary-strong), var(--primary));
        color: #07111c;
        font-weight: 700;
      }

      .secondary {
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
    <script>
      window.location.replace("https://nordforge-portfolio.vercel.app/");
    </script>
  </head>
  <body>
    <main>
      <p class="eyebrow">NORDFORGE PORTFOLIO</p>
      <h1>Сайт переехал в новый кабинет портфеля</h1>
      <p class="text">
        Сейчас вы автоматически перейдете на новую версию сервиса. Если переход не сработал,
        откройте портфель кнопкой ниже.
      </p>
      <div class="actions">
        <a class="primary" href="https://nordforge-portfolio.vercel.app/">Открыть портфель</a>
        <a class="secondary" href="https://nordforge-portfolio.vercel.app/login">Войти</a>
      </div>
    </main>
  </body>
</html>
