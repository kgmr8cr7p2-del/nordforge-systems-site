name: Refresh Portfolio Prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh endpoint
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/internal/refresh-prices" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
